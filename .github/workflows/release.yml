name: Release

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.0.9)'
        required: true
        default: '0.0.9'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Windows: 安装版 (NSIS) + 便捷版 (exe)
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NSIS
        run: choco install nsis -y
        shell: pwsh

      - name: Install Wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails@latest
        shell: pwsh
        env:
          GOPROXY: https://goproxy.cn,direct

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') { $v = '${{ github.event.inputs.version }}' }
          else { $v = '${{ github.ref_name }}'.TrimStart('v') }
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          echo "VERSION_FULL=$v.0" >> $env:GITHUB_OUTPUT

      - name: Sync version into sources
        shell: pwsh
        run: |
          $full = '${{ steps.ver.outputs.VERSION_FULL }}'
          $short = '${{ steps.ver.outputs.VERSION }}'
          (Get-Content wails.json) -replace '(?m)("productVersion":\s*)"[^"]*"', "`$1`"$full`"" | Set-Content -Encoding utf8 wails.json
          (Get-Content build/windows/info.json) -replace '(?m)("file_version":\s*)"[^"]*"', "`$1`"$full`"" | Set-Content -Encoding utf8 build/windows/info.json
          (Get-Content build/windows/info.json) -replace '(?m)("ProductVersion":\s*)"[^"]*"', "`$1`"$full`"" | Set-Content -Encoding utf8 build/windows/info.json
          $main = Get-Content main.go
          $main = $main -replace '(return\s+")\d+\.\d+\.\d+(")', "`$1$short`$2"
          $main | Set-Content -Encoding utf8 main.go

      - name: Build (installer + portable exe)
        run: |
          $env:PATH += ";$env:USERPROFILE\go\bin"
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          $env:GOPROXY = "https://goproxy.cn,direct"
          $env:CGO_ENABLED = "0"
          wails3 task windows:package
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            bin/sugarplayer.exe
            build/bin/sugarplayer-amd64-installer.exe

  # ---------------------------------------------------------------------------
  # macOS: .app 打包为 zip（adhoc 签名）
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build macOS
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails@latest
        env:
          GOPROXY: https://goproxy.cn,direct

      - name: Compute version
        id: ver
        run: |
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ]; then v='${{ github.event.inputs.version }}'; else v="${GITHUB_REF_NAME#v}"; fi
          echo "VERSION=$v" >> "$GITHUB_OUTPUT"
          echo "VERSION_FULL=$v.0" >> "$GITHUB_OUTPUT"

      - name: Sync version into sources
        run: |
          full='${{ steps.ver.outputs.VERSION_FULL }}'
          short='${{ steps.ver.outputs.VERSION }}'
          perl -i -pe "s/(\"productVersion\":\s*)\"[^\"]*\"/\$1\"$full\"/" wails.json
          perl -i -pe "s/(\"file_version\":\s*)\"[^\"]*\"/\$1\"$full\"/" build/windows/info.json
          perl -i -pe "s/(\"ProductVersion\":\s*)\"[^\"]*\"/\$1\"$full\"/" build/windows/info.json
          perl -i -pe 's/(return\s+\")\d+\.\d+\.\d+(\")/$1'"$short"'$2/' main.go

      - name: Build .app
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          export GOPROXY=https://goproxy.cn,direct
          wails3 task darwin:package

      - name: Zip .app
        run: ditto -c -k --sequesterForSecurity --keepParent bin/sugarplayer.app bin/sugarplayer-macos.zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: bin/sugarplayer-macos.zip

  # ---------------------------------------------------------------------------
  # Linux: 二进制 tarball + 尝试 AppImage
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails@latest
        env:
          GOPROXY: https://goproxy.cn,direct

      - name: Compute version
        id: ver
        run: |
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ]; then v='${{ github.event.inputs.version }}'; else v="${GITHUB_REF_NAME#v}"; fi
          echo "VERSION=$v" >> "$GITHUB_OUTPUT"
          echo "VERSION_FULL=$v.0" >> "$GITHUB_OUTPUT"

      - name: Sync version into sources
        run: |
          full='${{ steps.ver.outputs.VERSION_FULL }}'
          short='${{ steps.ver.outputs.VERSION }}'
          perl -i -pe "s/(\"productVersion\":\s*)\"[^\"]*\"/\$1\"$full\"/" wails.json
          perl -i -pe "s/(\"file_version\":\s*)\"[^\"]*\"/\$1\"$full\"/" build/windows/info.json
          perl -i -pe "s/(\"ProductVersion\":\s*)\"[^\"]*\"/\$1\"$full\"/" build/windows/info.json
          perl -i -pe 's/(return\s+\")\d+\.\d+\.\d+(\")/$1'"$short"'$2/' main.go

      - name: Build binary
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          export GOPROXY=https://goproxy.cn,direct
          wails3 task linux:build

      - name: Try build AppImage
        continue-on-error: true
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          wails3 task linux:create:appimage

      - name: Package tarball
        run: tar -czf bin/sugarplayer-linux-amd64.tar.gz -C bin sugarplayer

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: bin/sugarplayer-linux-amd64.tar.gz

      - name: Upload AppImage (if built)
        if: hashFiles('bin/*.AppImage') != ''
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: bin/*.AppImage

  # ---------------------------------------------------------------------------
  # 发布到 GitHub Releases
  # ---------------------------------------------------------------------------
  release:
    name: Publish Release
    needs: [build-windows, build-macos, build-linux]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Version
        id: ver
        run: |
          if [ '${{ github.event_name }}' = 'workflow_dispatch' ]; then v='${{ github.event.inputs.version }}'; else v="${GITHUB_REF_NAME#v}"; fi
          echo "VERSION=$v" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: SugarPlayer v${{ steps.ver.outputs.VERSION }}
          body: |
            ## SugarPlayer v${{ steps.ver.outputs.VERSION }}

            ### 下载
            - **Windows 安装版**：`sugarplayer-amd64-installer.exe`（推荐，含 WebView2 引导）
            - **Windows 便捷版**：`sugarplayer.exe`（解压即用）
            - **macOS**：`sugarplayer-macos.zip`（解压后拖入应用程序，未公证需自行授权）
            - **Linux**：`sugarplayer-linux-amd64.tar.gz`（或 `*.AppImage`）

            ### 蓝奏云
            https://wwazq.lanzoub.com/b00odsy2kd　密码：`1234`

            ### 腾讯频道
            https://pd.qq.com/s/yr6zo0yh
          files: dist/**/*

  # ---------------------------------------------------------------------------
  # 部署官网到 GitHub Pages（Web/ 目录）
  # ---------------------------------------------------------------------------
  deploy-pages:
    name: Deploy Website
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-${{ github.run_attempt }}
          path: Web
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_attempt }}